spring:
  application:
    name: puncher-manager
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:puncher_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-key-for-production-min-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:28800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    persist-authorization: true

logging:
  level:
    com.punchermanager: INFO
    org.springframework.security: INFO
