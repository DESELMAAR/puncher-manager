# Puncher Manager — run Postgres + API + UI together
# From project root:  docker compose up -d --build
# See runEplanation02.md for full explanation.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: puncher_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - puncher_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d puncher_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:


      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/puncher_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
      JWT_SECRET: docker-dev-change-me-use-long-random-secret-string-here-min-256-bits
      JWT_EXPIRATION_MS: "28800000"
      CORS_ORIGINS: http://localhost:3000
      SERVER_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser on host calls API at localhost:8080 (same machine port mapping)
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  puncher_pgdata:
